<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETWIN AI Assistant</title>
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="AI powered biology learning assistant for students">
    <meta property="og:title" content="ETWIN AI - Biology Assistant">
    <meta property="og:description" content="AI powered biology learning assistant for students">
    <meta property="og:image" content="/preview.png">
    <meta property="og:url" content="https://etwin-ai.vercel.app">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ETWIN AI - Biology Assistant">
    <meta name="twitter:description" content="AI powered biology learning assistant for students">
    <meta name="twitter:image" content="/preview.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </div>
            <div class="sidebar-menu">
                <button class="sidebar-item active" id="sidebarNewChat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                    <span class="sidebar-label" id="sidebarLabelNewChat"></span>
                </button>
                <button class="sidebar-item" id="sidebarTopics">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    <span class="sidebar-label" id="sidebarLabelTopics"></span>
                </button>
                <button class="sidebar-item" id="sidebarQuiz">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                    <span class="sidebar-label" id="sidebarLabelQuiz"></span>
                </button>
                <button class="sidebar-item" id="sidebarAbout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                    <span class="sidebar-label" id="sidebarLabelAbout"></span>
                </button>
            </div>
        </div>
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <button class="hamburger-menu" id="hamburgerMenu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="main-area">
            <div class="chat-container" id="chatContainer">
                <button class="language-toggle" id="languageToggle">
                    <span class="lang-tr">TR</span>
                    <span class="lang-en">EN</span>
                </button>
                <div class="landing-screen" id="landingScreen">
                    <div class="hero-illustration">
                        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path class="dna-strand" d="M60 20 C60 20, 140 60, 60 100 C60 100, 140 140, 60 180" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round"/>
                            <path class="dna-strand" d="M140 20 C140 20, 60 60, 140 100 C140 100, 60 140, 140 180" stroke="url(#grad2)" stroke-width="3" fill="none" stroke-linecap="round"/>
                            <line class="dna-base" x1="65" y1="35" x2="135" y2="35" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                            <line class="dna-base" x1="72" y1="50" x2="128" y2="50" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                            <line class="dna-base" x1="78" y1="65" x2="122" y2="65" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                            <line class="dna-base" x1="72" y1="80" x2="128" y2="80" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                            <line class="dna-base" x1="65" y1="95" x2="135" y2="95" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                            <line class="dna-base" x1="72" y1="110" x2="128" y2="110" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                            <line class="dna-base" x1="78" y1="125" x2="122" y2="125" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                            <line class="dna-base" x1="72" y1="140" x2="128" y2="140" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                            <line class="dna-base" x1="65" y1="155" x2="135" y2="155" stroke="#0d9488" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
                            <circle cx="100" cy="100" r="70" fill="url(#cellGrad)" opacity="0.3"/>
                            <defs>
                                <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient>
                                <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#14b8a6"/></linearGradient>
                                <radialGradient id="cellGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0d9488" stop-opacity="0.4"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/></radialGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="hero-heading">
                        <h1 class="hero-title" id="landingTitle"></h1>
                        <p class="hero-subtitle" id="landingDescription"></p>
                    </div>
                    <div class="feature-cards">
                        <button class="feature-button" data-prompt-tr="Bana fotosentez konusunu anlat" data-prompt-en="Explain photosynthesis" id="featureBtn1">
                            <div class="feat-title" id="featTitle1"></div>
                            <div class="feat-desc" id="featDesc1"></div>
                        </button>
                        <button class="feature-button" data-prompt-tr="Biyoloji quiz oluştur" data-prompt-en="Create biology quiz" id="featureBtn2">
                            <div class="feat-title" id="featTitle2"></div>
                            <div class="feat-desc" id="featDesc2"></div>
                        </button>
                        <button class="feature-button" data-prompt-tr="Sınav için biyoloji konularını hazırla" data-prompt-en="Prepare biology topics for exam" id="featureBtn3">
                            <div class="feat-title" id="featTitle3"></div>
                            <div class="feat-desc" id="featDesc3"></div>
                        </button>
                    </div>
                    <div class="input-area">
                        <div class="input-glass">
                            <textarea class="chat-input" id="landingInput" rows="1"></textarea>
                            <button class="send-button" id="landingSendBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-container" id="chatInputContainer">
                    <div class="input-glass">
                        <textarea class="chat-input" id="chatInput" rows="1"></textarea>
                        <button class="stop-button" id="stopButton">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                            <span id="stopText"></span>
                        </button>
                        <button class="send-button" id="sendButton">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { updateUILanguage(); }, 100);
        });

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        const landingScreen = document.getElementById('landingScreen');
        const landingInput = document.getElementById('landingInput');
        const chatContainer = document.getElementById('chatContainer');
        const chatInputContainer = document.getElementById('chatInputContainer');
        const stopButton = document.getElementById('stopButton');
        const languageToggle = document.getElementById('languageToggle');
        const hamburgerMenu = document.getElementById('hamburgerMenu');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const sidebar = document.querySelector('.sidebar');
        const featureButtons = document.querySelectorAll('.feature-button');
        const sidebarItems = document.querySelectorAll('.sidebar-item');

        let isChatMode = false;
        let isTyping = false;
        let isGenerating = false;
        let abortController = null;
        let messages = [];
        const MAX_MESSAGES = 20;

        let currentLanguage = localStorage.getItem('etwin_language') || (navigator.language.startsWith('tr') ? 'tr' : 'en');

        const translations = {
            tr: {
                landingTitle: 'Hey!',
                landingDescription: 'Bugün ne öğrenmek istiyorsun?',
                landingPlaceholder: 'Biyoloji hakkında bir şey sor…',
                landingPlaceholderFocus: 'Ornek: Fotosentez nasıl gerçekleşir?',
                chatPlaceholder: 'Mesaj yaz…',
                chatPlaceholderFocus: 'Ornek: DNA\'nın yapısı nedir?',
                send: 'Gonder',
                stop: 'Durdur',
                thinking: 'ETWIN dusunuyor…',
                copied: 'Kopyalandı',
                error: 'Su an AI servisine ulasilmiyor, tekrar deneyin',
                newChat: 'Yeni Sohbet',
                topics: 'Konular',
                quiz: 'Quiz',
                about: 'Hakkinda',
                feature1: 'Konu Anlat',
                feature2: 'Quiz Olustur',
                feature3: 'Sinav Hazirlik',
                featDesc1: 'Fotosentez, hucre bolunmesi ve daha fazlasi',
                featDesc2: '10 soruluk interaktif testler',
                featDesc3: 'Konu anlatimi ve ozet notlar',
                error400: 'Gecersiz istek, lutfen tekrar deneyin',
                error429: 'Cok fazla istek, lutfen 1 dakika bekleyin',
                error500: 'Sunucu hatasi olustu, lutfen tekrar deneyin',
                error503: 'Servis gecici olarak kullanilamiyor, lutfen bekleyin',
                errorDefault: 'Bir hata olustu, lutfen tekrar deneyin'
            },
            en: {
                landingTitle: 'Hey!',
                landingDescription: 'What do you want to learn today?',
                landingPlaceholder: 'Ask about biology…',
                landingPlaceholderFocus: 'Example: How does photosynthesis work?',
                chatPlaceholder: 'Type a message…',
                chatPlaceholderFocus: 'Example: What is the structure of DNA?',
                send: 'Send',
                stop: 'Stop',
                thinking: 'ETWIN is thinking…',
                copied: 'Copied',
                error: 'AI service unavailable, please try again',
                newChat: 'New Chat',
                topics: 'Topics',
                quiz: 'Quiz',
                about: 'About',
                feature1: 'Explain Topic',
                feature2: 'Create Quiz',
                feature3: 'Exam Prep',
                featDesc1: 'Photosynthesis, cell division and more',
                featDesc2: '10-question interactive quizzes',
                featDesc3: 'Topic explanations and summary notes',
                error400: 'Invalid request, please try again',
                error429: 'Too many requests, please wait 1 minute',
                error500: 'Server error occurred, please try again',
                error503: 'Service temporarily unavailable, please wait',
                errorDefault: 'An error occurred, please try again'
            }
        };

        function t(key) { return translations[currentLanguage][key] || key; }

        function setLanguage(lang) {
            currentLanguage = lang;
            localStorage.setItem('etwin_language', lang);
            updateUILanguage();
        }

        function updateUILanguage() {
            const landingTitle = document.getElementById('landingTitle');
            if (landingTitle) landingTitle.textContent = t('landingTitle');
            const landingDescription = document.getElementById('landingDescription');
            if (landingDescription) landingDescription.textContent = t('landingDescription');
            if (landingInput) landingInput.placeholder = t('landingPlaceholder');
            if (chatInput) chatInput.placeholder = t('chatPlaceholder');
            const stopText = document.getElementById('stopText');
            if (stopText) stopText.textContent = t('stop');
            for (let i = 1; i <= 3; i++) {
                const title = document.getElementById('featTitle' + i);
                const desc = document.getElementById('featDesc' + i);
                const btn = document.getElementById('featureBtn' + i);
                if (title) title.textContent = t('feature' + i);
                if (desc) desc.textContent = t('featDesc' + i);
                if (btn) {
                    const ptr = ['Bana fotosentez konusunu anlat','Biyoloji quiz olustur','Sinav icin biyoloji konularini hazirla'];
                    const pen = ['Explain photosynthesis','Create biology quiz','Prepare biology topics for exam'];
                    btn.setAttribute('data-prompt-tr', ptr[i-1]);
                    btn.setAttribute('data-prompt-en', pen[i-1]);
                }
            }
            const s1 = document.getElementById('sidebarLabelNewChat');
            if (s1) s1.textContent = t('newChat');
            const s2 = document.getElementById('sidebarLabelTopics');
            if (s2) s2.textContent = t('topics');
            const s3 = document.getElementById('sidebarLabelQuiz');
            if (s3) s3.textContent = t('quiz');
            const s4 = document.getElementById('sidebarLabelAbout');
            if (s4) s4.textContent = t('about');
            const ti = document.getElementById('typingIndicator');
            if (ti) {
                const txt = ti.querySelector('.typing-indicator-text');
                if (txt) txt.textContent = t('thinking');
            }
            updateLanguageToggle();
        }

        function updateLanguageToggle() {
            const lt = document.getElementById('languageToggle');
            if (!lt) return;
            const tr = lt.querySelector('.lang-tr');
            const en = lt.querySelector('.lang-en');
            if (!tr || !en) return;
            if (currentLanguage === 'tr') {
                tr.classList.add('lang-active'); tr.classList.remove('lang-inactive');
                en.classList.add('lang-inactive'); en.classList.remove('lang-active');
            } else {
                en.classList.add('lang-active'); en.classList.remove('lang-inactive');
                tr.classList.add('lang-inactive'); tr.classList.remove('lang-active');
            }
        }

        languageToggle.addEventListener('click', () => {
            setLanguage(currentLanguage === 'tr' ? 'en' : 'tr');
        });

        hamburgerMenu.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
        });

        function autoResize(ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
        landingInput.addEventListener('input', () => autoResize(landingInput));
        chatInput.addEventListener('input', () => autoResize(chatInput));

        function trimMessages() {
            if (messages.length > MAX_MESSAGES) messages = messages.slice(messages.length - MAX_MESSAGES);
        }
        function isUserAtBottom() {
            return chatMessages.scrollHeight - chatMessages.scrollTop - chatMessages.clientHeight < 100;
        }

        function showError(msg) {
            const md = document.createElement('div');
            md.className = 'message error';
            const cd = document.createElement('div'); cd.className = 'message-content';
            cd.innerHTML = '<span class="error-icon">⚠</span> ' + msg;
            const td = document.createElement('div'); td.className = 'message-timestamp'; td.textContent = getTimestamp();
            md.appendChild(cd); md.appendChild(td);
            const ab = isUserAtBottom();
            chatMessages.appendChild(md);
            if (ab) scrollToBottom();
        }

        function getErrorMessage(st) {
            const k = 'error' + st;
            return translations[currentLanguage][k] ? t(k) : t('errorDefault');
        }
        function scrollToBottom() { chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: 'smooth' }); }
        function getTimestamp() {
            const n = new Date();
            return n.getHours().toString().padStart(2,'0') + ':' + n.getMinutes().toString().padStart(2,'0');
        }

        function sanitizeHTML(html) {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            temp.querySelectorAll('script').forEach(s => s.remove());
            temp.querySelectorAll('*').forEach(el => {
                const attrs = el.attributes;
                for (let i = attrs.length - 1; i >= 0; i--) {
                    if (attrs[i].name.startsWith('on')) el.removeAttribute(attrs[i].name);
                }
            });
            return temp.innerHTML;
        }

        function addMessage(text, isUser) {
            const md = document.createElement('div');
            md.className = 'message ' + (isUser ? 'user' : 'bot');
            const cd = document.createElement('div'); cd.className = 'message-content';
            if (!isUser) {
                cd.innerHTML = sanitizeHTML(marked.parse(text));
            } else {
                cd.textContent = text;
            }
            const td = document.createElement('div'); td.className = 'message-timestamp'; td.textContent = getTimestamp();
            md.appendChild(cd); md.appendChild(td);
            if (!isUser) {
                const cb = document.createElement('button');
                cb.className = 'copy-button';
                cb.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                cb.addEventListener('click', e => { e.stopPropagation(); copyToClipboard(text, cb); });
                md.appendChild(cb);
            }
            const ab = isUserAtBottom();
            chatMessages.appendChild(md);
            if (ab) scrollToBottom();
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const fb = document.createElement('div');
                fb.className = 'copy-feedback visible';
                fb.textContent = t('copied');
                btn.parentElement.appendChild(fb);
                setTimeout(() => { fb.classList.remove('visible'); setTimeout(() => fb.remove(), 200); }, 1500);
            }).catch(err => console.error('Failed to copy:', err));
        }

        function showTypingIndicator() {
            const td = document.createElement('div');
            td.className = 'typing-indicator';
            td.id = 'typingIndicator';
            td.innerHTML = '<span class="typing-indicator-text">' + t('thinking') + '</span>';
            const ab = isUserAtBottom();
            chatMessages.appendChild(td);
            if (ab) scrollToBottom();
            stopButton.classList.add('visible');
        }

        function hideTypingIndicator() {
            const ti = document.getElementById('typingIndicator');
            if (ti) ti.remove();
            stopButton.classList.remove('visible');
        }

        function typeMessage(text) {
            isTyping = true;
            const md = document.createElement('div');
            md.className = 'message bot';
            const cd = document.createElement('div'); cd.className = 'message-content';
            md.appendChild(cd);
            const cursor = document.createElement('span');
            cursor.className = 'typing-cursor';
            cd.appendChild(cursor);
            const td = document.createElement('div'); td.className = 'message-timestamp'; td.textContent = getTimestamp();
            md.appendChild(td);
            const cb = document.createElement('button');
            cb.className = 'copy-button';
            cb.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
            cb.addEventListener('click', e => { e.stopPropagation(); copyToClipboard(text, cb); });
            md.appendChild(cb);
            chatMessages.appendChild(md);
            stopButton.classList.add('visible');
            let idx = 0;
            const speed = 12;
            function type() {
                if (!isTyping) { cursor.remove(); return; }
                if (idx < text.length) {
                    cd.textContent = text.substring(0, idx + 1);
                    cd.appendChild(cursor);
                    idx++;
                    setTimeout(type, speed);
                } else {
                    isTyping = false;
                    cursor.remove();
                    cd.innerHTML = sanitizeHTML(marked.parse(text));
                    stopButton.classList.remove('visible');
                    if (isUserAtBottom()) scrollToBottom();
                }
            }
            type();
        }

        function stopGenerating() {
            isTyping = false;
            isGenerating = false;
            if (abortController) { abortController.abort(); abortController = null; }
            hideTypingIndicator();
            stopButton.classList.remove('visible');
            sendButton.style.display = '';
        }
        stopButton.addEventListener('click', stopGenerating);

        function switchToChatMode() {
            if (!isChatMode) {
                landingScreen.classList.add('hidden');
                setTimeout(() => {
                    chatMessages.classList.add('visible');
                    chatInputContainer.classList.add('visible');
                    chatInput.focus();
                }, 500);
                isChatMode = true;
            }
        }

        function resetChat() {
            chatMessages.innerHTML = '';
            isChatMode = false;
            landingScreen.classList.remove('hidden');
            chatMessages.classList.remove('visible');
            chatInputContainer.classList.remove('visible');
            isTyping = false;
            messages = [];
            showFeatureCards();
        }

        function fadeFeatureCards() { featureButtons.forEach(b => b.classList.add('faded')); }
        function showFeatureCards() { featureButtons.forEach(b => b.classList.remove('faded')); }

        async function handleSendMessage(inputElement) {
            const message = inputElement.value.trim();
            if (message === '' || isTyping || isGenerating) return;
            switchToChatMode();
            fadeFeatureCards();
            messages.push({ role: 'user', content: message });
            trimMessages();
            addMessage(message, true);
            inputElement.value = '';
            inputElement.style.height = 'auto';
            showTypingIndicator();
            isGenerating = true;
            stopButton.classList.add('visible');
            sendButton.style.display = 'none';
            abortController = new AbortController();
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages }),
                    signal: abortController.signal
                });
                if (!response.ok) {
                    hideTypingIndicator();
                    isGenerating = false;
                    stopButton.classList.remove('visible');
                    sendButton.style.display = '';
                    showError(getErrorMessage(response.status));
                    return;
                }
                const data = await response.json();
                hideTypingIndicator();
                isGenerating = false;
                stopButton.classList.remove('visible');
                sendButton.style.display = '';
                messages.push({ role: 'assistant', content: data.response });
                trimMessages();
                typeMessage(data.response);
            } catch (error) {
                hideTypingIndicator();
                isGenerating = false;
                stopButton.classList.remove('visible');
                sendButton.style.display = '';
                if (error.name === 'AbortError') { console.log('Request aborted by user'); return; }
                showError(t('errorDefault'));
            }
        }

        landingInput.addEventListener('focus', () => { landingInput.placeholder = t('landingPlaceholderFocus'); });
        landingInput.addEventListener('blur', () => { landingInput.placeholder = t('landingPlaceholder'); });
        landingInput.addEventListener('input', () => {
            if (landingInput.value.length > 0) fadeFeatureCards(); else showFeatureCards();
        });
        chatInput.addEventListener('focus', () => { chatInput.placeholder = t('chatPlaceholderFocus'); });
        chatInput.addEventListener('blur', () => { chatInput.placeholder = t('chatPlaceholder'); });
        landingInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(landingInput); }
        });
        chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(chatInput); }
        });
        sendButton.addEventListener('click', () => handleSendMessage(chatInput));
        document.getElementById('landingSendBtn').addEventListener('click', () => handleSendMessage(landingInput));

        featureButtons.forEach(button => {
            button.addEventListener('click', () => {
                const prompt = button.getAttribute('data-prompt-' + currentLanguage);
                landingInput.value = prompt;
                handleSendMessage(landingInput);
            });
        });

        const sidebarPrompts = {
            0: 'Bana yeni bir biyoloji konusu anlat',
            1: 'Biyoloji konularini listele',
            2: 'Bana biyoloji quiz olustur'
        };
        sidebarItems.forEach((item, index) => {
            item.addEventListener('click', () => {
                sidebarItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                if (index === 3) {
                    showAboutContent();
                } else {
                    const prompt = sidebarPrompts[index];
                    if (prompt) { landingInput.value = prompt; handleSendMessage(landingInput); }
                }
            });
        });

        function showAboutContent() {
            switchToChatMode();
            const aboutHTML = `<h2>🌱 Etwin AI Projesi</h2>
<p>
Etwin projesi, STEAM uygulamaları kapsamında 2026 yılında geliştirilen, 
yapay zeka destekli bir eTwinning girişimidir. Bu proje, öğrencilerin 
bilimsel düşünme becerilerini geliştirmeyi ve teknolojiyi eğitimle 
entegre etmeyi amaçlamaktadır.
</p>
<p>
Proje geliştiricileri, Biyoloji öğretmeni Esra Atabaş ve MADFEN Lisesi 10/B sınıfı öğrencileridir. 
Bu ekip, modern yapay zeka teknolojilerini kullanarak biyoloji alanında 
öğrenmeyi daha hızlı, anlaşılır ve etkili hale getirmeyi hedeflemiştir.
</p>
<h3>🚀 Projenin Amaçları</h3>
<ul>
<li>📚 Biyoloji konularını sade ve anlaşılır şekilde sunmak</li>
<li>🧠 Öğrenciler için interaktif öğrenme deneyimi oluşturmak</li>
<li>⚡ Yapay zeka ile hızlı ve doğru bilgi erişimi sağlamak</li>
<li>🌍 Dijital eğitimde yenilikçi çözümler geliştirmek</li>
</ul>
<h3>💡 Özellikler</h3>
<ul>
<li>AI destekli soru-cevap sistemi</li>
<li>Otomatik quiz oluşturma</li>
<li>Kısa özet ve konu anlatımı</li>
<li>Çoklu dil desteği (Türkçe / İngilizce)</li>
</ul>
<p>
Etwin AI, geleceğin eğitim teknolojilerine bir adım daha yaklaşmayı 
hedefleyen yenilikçi bir öğrenci projesidir.
</p>`;
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = sanitizeHTML(aboutHTML);
            const timestampDiv = document.createElement('div');
            timestampDiv.className = 'message-timestamp';
            timestampDiv.textContent = getTimestamp();
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timestampDiv);
            const copyButton = document.createElement('button');
            copyButton.className = 'copy-button';
            copyButton.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
            copyButton.addEventListener('click', e => { e.stopPropagation(); copyToClipboard(aboutHTML.replace(/<[^>]*>/g, ''), copyButton); });
            messageDiv.appendChild(copyButton);
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }
        sidebarItems[0].addEventListener('click', e => {
            e.stopPropagation();
            resetChat();
            sidebarItems.forEach(i => i.classList.remove('active'));
            sidebarItems[0].classList.add('active');
        });
        const sidebarLogo = document.querySelector('.sidebar-logo');
        if (sidebarLogo) {
            sidebarLogo.addEventListener('click', () => {
                resetChat();
                sidebarItems.forEach(i => i.classList.remove('active'));
                sidebarItems[0].classList.add('active');
            });
        }
        window.addEventListener('load', () => { landingInput.focus(); });
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(() => console.log('Service Worker registered')).catch(err => console.log('Service Worker registration failed:', err));
        }
    </script>
</body>
</html>
